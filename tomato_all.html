<!DOCTYPE html>
<html lang="uk">
<head>
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="js/main.js" defer></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grapefruit Hybrids</title> <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="responsive.css">

    <style>
    .pink-bg-content {
        background-color: #fff2e6 !important; 
    }

    .row {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: flex-start;
    }

    .tomatoItem {
        width: calc(33.333% - 20px); 
        margin-bottom: 30px;
        min-width: 250px; 
    }

    .tomatoImg {
        height: 200px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        border: 1px solid #ddd;
    }

    .tomatoImg img {
        width: 100%; 
        height: 100%;
        object-fit: cover;
    }

    .tomatoInfo {
        padding: 10px 0;
        text-align: center;
    }
    </style>
</head>
<body>

<article class="page-container tomato-page">

    <header class="static-header">
        <div class="header-logo header-logo-small">
             <a href="index.html"><img src="image/Logo1.png" alt="Agridera Logo"></a>
        </div>
        <div class="header-search-nav">
            <div class="header-search">
                <form action="#" method="get">
                    <input type="search" placeholder="Search" name="search">
                    <button type="submit" class="search-btn">🔍</button>
                </form>
            </div>
            <div class="header-nav" :class="{ 'active': showMobileMenu }">
                    <nav>
                        <div class="mobile-menu-toggle" id="mobile-menu" @click="showMobileMenu = !showMobileMenu">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="#">Company Profile</a></li>
                        <li><a href="tomato_all.html">Products</a></li>
                        <li><a href="#">Services</a></li>
                        <li><a href="#">R&D</a></li>
                        <li><a href="contact_us.html">Contact</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <section class="page-banner">
        <img src="image/grep/bg.jpg" alt="Grapefruits">
    </section>

    <main class="pink-bg-content">
        <div class="container">
            <h1 class="page-main-title">Agridera Fresh Market Grapefruit Hybrids</h1>
            <div class="green-crosses">ₓₓₓₓₓ</div>
            
            <div class="tomatosList col-md-12">
                <div class="row" style="display: flex; flex-wrap: wrap; gap: 20px;">
                    
                    <div class="tomatoItem col-md-4" v-if="products" v-for="p in products">
                        <div class="col-md-12">
                            <div class="tomatoImg">
                                <a :href="'tomato_one.html#' + p.id">
                                    <img :src="'image/grep/' + p.image" alt="grapefruit">
                                </a>
                            </div>
                            <div class="tomatoInfo">
                                <a :href="'tomato_one.html#' + p.id" style="text-decoration: none; color: inherit;">
                                    <b style="font-size:20px; line-height: 28px;">{{p.title}}</b>
                                </a>
                                <br>
                                {{p.short_text}}
                            </div>
                        </div>
                    </div>
                    </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-links">
                <ul>
                    <li><a href="#">PROFILE</a></li>
                    <li><a href="#">MANAGEMENT</a></li>
                    <li><a href="tomato_all.html">PRODUCTS</a></li>
                    <li><a href="#">R&D</a></li>
                    <li><a href="#">LINKS</a></li>
                    <li><a href="#">SITEMAP</a></li>
                    <li><a href="contact_us.html">CONTACT</a></li>
                </ul>
            </div>
            <div class="footer-social">
                <div class="social-icons">
                    <a href="#"><img src="image/in.png" alt="LinkedIn"></a>
                    <a href="#"><img src="image/inst.png" alt="Instagram"></a>
                    <a href="#"><img src="image/tube.png" alt="YouTube"></a>
                    <a href="#"><img src="image/tw.png" alt="Twitter"></a>
                    <a href="#"><img src="image/fb.png" alt="Facebook"></a>
                </div>
            </div>
        </div>
        <p class="copyright">AGRIDERA SEEDS & AGRICULTURE LTD. @ 2026</p>
    </footer>

</article>

</body>
</html>
